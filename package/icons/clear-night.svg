<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="64" height="64" viewbox="0 0 64 64">
  <defs>
    <filter id="blur" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="0" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.05" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#blur)" id="night">
    <g transform="translate(20,20)">
      <g class="am-weather-moon-star-1">
        <polygon fill="orange" points="3.3,1.5 4,2.7 5.2,3.3 4,4 3.3,5.2 2.7,4 1.5,3.3 2.7,2.7" stroke="none" stroke-miterlimit="10" />
        <animate attributeName="opacity" values="0;1" keyTimes="0.0000;1.0000" dur="5s" repeatCount="1" calcMode="linear" begin="3s" />
      </g>
      <g class="am-weather-moon-star-2">
        <polygon fill="orange" points="3.3,1.5 4,2.7 5.2,3.3 4,4 3.3,5.2 2.7,4 1.5,3.3 2.7,2.7" stroke="none" stroke-miterlimit="10" transform="translate(20,10)" />
        <animate attributeName="opacity" values="0;1" keyTimes="0.0000;1.0000" dur="4s" repeatCount="1" calcMode="linear" begin="5s" />
      </g>
      <g class="am-weather-moon">
        <path d="M14.5,13.2c0-3.7,2-6.9,5-8.7   c-1.5-0.9-3.2-1.3-5-1.3c-5.5,0-10,4.5-10,10s4.5,10,10,10c1.8,0,3.5-0.5,5-1.3C16.5,20.2,14.5,16.9,14.5,13.2z" fill="orange" stroke="orange" stroke-linejoin="round" stroke-width="2" />
        <animateTransform attributeName="transform" type="rotate" values="0.0;15.0;0.0" keyTimes="0.0000;0.5000;1.0000" dur="6s" repeatCount="indefinite" calcMode="linear" />
      </g>
    </g>
  </g>
</svg>