name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: docker.io/hualet/deepin:25.1-builder
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            cmake \
            pkg-config \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-declarative-dev \
            qt6-svg-dev \
            qt6-positioning-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            libdtk6core-dev \
            libdtk6gui-dev \
            libdtk6widget-dev \
            libdde-shell-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build --parallel "$(nproc)"

      - name: Stage install tree
        run: DESTDIR="${PWD}/stage" cmake --install build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dde-shell-weather-plugin-install-tree
          path: stage/usr/
